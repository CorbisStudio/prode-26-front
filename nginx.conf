# =============================================================================
# World Cup Prode - Nginx configuration for i18n multi-locale Angular app
# =============================================================================

# Detect preferred locale in this order:
# 1. Cookie "locale" (explicit user choice, persisted by the language selector)
# 2. Accept-Language header (browser language)
# Matches "en", "en-US", "en-GB", etc. → en; everything else → es.

map $cookie_locale $cookie_locale_value {
    default  '';
    ~*^en    en;
    ~*^es    es;
}

map $http_accept_language $browser_locale {
    default  es;
    ~*^en    en;
}

map $cookie_locale_value$browser_locale $preferred_locale {
    default          $browser_locale;
    "~^es.*"         es;
    "~^en.*"         en;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers (repeated in child location blocks because nginx
    # does not inherit add_header when the child defines its own headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Root: redirect to browser-preferred locale
    location = / {
        return 302 /$preferred_locale/;
    }

    # Bare locale slugs without trailing slash → add it (permanent)
    location = /es { return 301 /es/; }
    location = /en { return 301 /en/; }

    # Favicon (use ES copy as canonical)
    location = /favicon.ico {
        try_files /es/favicon.ico =404;
        expires 1w;
        access_log off;
    }

    # Static assets referenced without locale prefix (e.g. /img/logo-azul.png).
    # Angular places public/ assets under each locale dir (/es/img/, /en/img/).
    # Fall back to the ES copy since images are locale-independent.
    location ^~ /img/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://a1b294b0dce6246168e6682809e8fef5-1925402808.us-west-2.elb.amazonaws.com; font-src 'self';" always;
        access_log off;
        try_files /es$uri /en$uri =404;
    }

    # Hashed assets (js/css/fonts/images) — served directly, immutable cache.
    # Security headers repeated here because child add_header overrides parent.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://a1b294b0dce6246168e6682809e8fef5-1925402808.us-west-2.elb.amazonaws.com; font-src 'self';" always;
        access_log off;
        try_files $uri =404;
    }

    # Spanish locale — SPA fallback to /es/index.html
    location /es/ {
        try_files $uri $uri/ /es/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # English locale — SPA fallback to /en/index.html
    location /en/ {
        try_files $uri $uri/ /en/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Any other path: redirect to Spanish equivalent
    location / {
        return 302 /es$request_uri;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

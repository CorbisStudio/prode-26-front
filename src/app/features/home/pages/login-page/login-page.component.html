<div class="min-h-screen flex items-center justify-center p-4 sm:p-8">
  <div class="surface-heavy rounded-3xl overflow-hidden max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2">

    <!-- Left: Form -->
    <div class="p-8 sm:p-12 lg:p-14 flex flex-col justify-center">
      <div class="mb-8">
        <img src="/img/logo-azul.png" alt="Prode Mundial" class="h-14 w-auto object-contain mb-6" />
        <h1 class="text-2xl sm:text-3xl font-black text-noche mb-2 tracking-tight leading-tight">
          Bienvenido al Prode<br />de los Corbisters
        </h1>
        <p class="text-gris text-sm leading-relaxed">Ingresá y demostrá que sabés más de fútbol.</p>
      </div>

      @if (error()) {
        <div class="mb-6 flex items-center gap-3 text-red-700 bg-red-50 border border-red-100 rounded-xl px-4 py-3 text-sm">
          <svg lucideAlertCircle class="w-5 h-5 shrink-0"></svg>
          <span>{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-noche mb-2">Email</label>
          <div class="relative">
            <svg lucideMail class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gris pointer-events-none"></svg>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              required
              autocomplete="email"
              class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-noche placeholder:text-gris/50 outline-none text-sm"
              placeholder="tu@corbisstudio.com"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-noche mb-2">Contraseña</label>
          <div class="relative">
            <svg lucideLock class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gris pointer-events-none"></svg>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              required
              autocomplete="current-password"
              class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-noche placeholder:text-gris/50 outline-none text-sm"
              placeholder="••••••••"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading() || !email().trim() || !password().trim()"
          class="btn-dorado w-full disabled:opacity-50 disabled:cursor-not-allowed font-bold py-3 rounded-full mt-2 text-sm"
        >
          @if (loading()) {
            <span class="inline-flex items-center justify-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Ingresando...
            </span>
          } @else {
            Entrar
          }
        </button>
      </form>

      <p class="mt-8 text-xs text-gris/50 text-center tracking-wide">
        Un proyecto de <span class="font-semibold text-gris/70">Corbis Studio</span> · Build everything better
      </p>
    </div>

    <!-- Right: Image -->
    <div class="hidden lg:block relative bg-noche">
      <img src="/img/imagen-login.png" alt="Mundial" class="absolute inset-0 w-full h-full object-cover opacity-90" />
      <div class="absolute inset-0 bg-gradient-to-t from-noche via-noche/30 to-transparent"></div>
      <div class="absolute bottom-10 left-10 right-10">
        <p class="text-white font-black text-3xl leading-tight tracking-tight">
          Predecí.<br />Competí.<br />
          <span class="text-dorado">Dominá.</span>
        </p>
        <p class="text-white/50 text-sm mt-3 leading-relaxed">
          El prode que une al equipo.<br />¿Quién sabe más de fútbol?
        </p>
      </div>
    </div>

  </div>
</div>
